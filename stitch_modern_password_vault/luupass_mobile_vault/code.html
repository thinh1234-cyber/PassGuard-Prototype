<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>LuuPass - Mobile Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "surface-variant": "#34343d",
                      "surface-container-lowest": "#0d0e16",
                      "error-container": "#93000a",
                      "background": "#12131b",
                      "secondary-fixed": "#f0dbff",
                      "on-tertiary-container": "#fafff9",
                      "on-tertiary": "#003824",
                      "inverse-on-surface": "#2f3039",
                      "secondary": "#ddb7ff",
                      "on-error": "#690005",
                      "tertiary-fixed-dim": "#4edea3",
                      "surface-container-low": "#1a1b23",
                      "surface-container": "#1f1f27",
                      "secondary-fixed-dim": "#ddb7ff",

          }

<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #34343d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #454655; }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(41, 41, 50, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .nav-shell-shadow {
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container pb-[80px]">
<!-- TopNavBar (Adapted for Mobile based on JSON) -->
<header class="sticky top-0 z-40 bg-surface/80 backdrop-blur-md flex justify-between items-center h-16 w-full px-margin-mobile">
<div class="flex-1 flex items-center bg-surface-container-low rounded-full px-4 py-2 border border-outline-variant/20 focus-within:border-primary focus-within:shadow-[0_0_0_2px_rgba(190,194,255,0.2)] transition-all mr-4">
<span class="material-symbols-outlined text-outline mr-2 text-[20px]" data-icon="search">search</span>
<input class="bg-transparent border-none outline-none text-on-surface w-full font-body-sm placeholder:text-outline h-full py-0 focus:ring-0" placeholder="Search vault..." type="text"/>
</div>
<div class="flex items-center gap-sm">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest/20 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="sync">sync</span>
</button>
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/30 flex-shrink-0 cursor-pointer hover:border-primary transition-colors">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="A close-up portrait of a professional individual against a dark, minimalist slate background. The lighting is soft and high-key, illuminating their face clearly while maintaining the overall dark-mode aesthetic of the interface. The mood is calm and secure." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9yWBrESi0OaiZcwj-N9GjSH6YiOlQa7ljnnAQEkQhhxkm_3xPwdOHBzPYC-ZDHvP9bIW2Nmzx6E40RHJNfknEuR_gRqiHB0KUhLeF8k60Tezm1_eF16ciXYtUzFQJdkiVWBq9juLB65feD7xsVCgQtU_yV4SI-RI58euUcO-4rkM4tHRvZrnJ6g98CbxQRziXQUMmMfVxAvCYvImnNzjzPCMVndpifsWyD_7HeqHd6ECvI1zWyMPhHncC9qHOF5oH8EyQCH8WWsA"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile py-lg overflow-y-auto">
<!-- Vault Health Summary (High-End Dashboard Pattern) -->
<section class="mb-xl">
<div class="glass-panel rounded-xl p-md flex items-center justify-between">
<div>
<h2 class="font-label-md text-label-md text-on-surface-variant mb-1 uppercase tracking-wider">Vault Status</h2>
<p class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="check_circle" data-weight="fill">check_circle</span>
                        Secure
                    </p>
</div>
<div class="text-right">
<p class="font-display-lg text-display-lg text-primary leading-none">24</p>
<p class="font-body-sm text-body-sm text-outline">Total Items</p>
</div>
</div>
</section>
<!-- Pinned / Favorites Section -->
<div class="flex items-center justify-between mb-md">
<h3 class="font-headline-md text-[20px] text-on-surface">Recent &amp; Pinned</h3>
<button class="text-primary font-label-md text-label-md hover:text-primary-fixed transition-colors">View All</button>
</div>
<!-- List of Vault Items -->
<div class="space-y-sm">
<!-- Item 1: Google -->
<div class="group relative flex items-center justify-between p-md bg-surface-container-low rounded-lg border border-outline-variant/10 hover:border-outline-variant/30 transition-all cursor-pointer overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-[2px] bg-transparent group-hover:bg-primary transition-colors"></div>
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-[24px]" data-icon="public">public</span>
</div>
<div>
<h4 class="font-label-md text-label-md text-on-surface">Google</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">3 accounts</p>
</div>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-outline hover:text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<!-- Item 2: Twitter -->
<div class="group relative flex items-center justify-between p-md bg-surface-container-low rounded-lg border border-outline-variant/10 hover:border-outline-variant/30 transition-all cursor-pointer overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-[2px] bg-transparent group-hover:bg-primary transition-colors"></div>
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-[24px]" data-icon="flutter_dash">flutter_dash</span>
</div>
<div>
<h4 class="font-label-md text-label-md text-on-surface">Twitter</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">1 account</p>
</div>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-outline hover:text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<!-- Item 3: Netflix -->
<div class="group relative flex items-center justify-between p-md bg-surface-container-low rounded-lg border border-outline-variant/10 hover:border-outline-variant/30 transition-all cursor-pointer overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-[2px] bg-transparent group-hover:bg-primary transition-colors"></div>
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-[#E50914]">
<span class="material-symbols-outlined text-[24px]" data-icon="movie">movie</span>
</div>
<div>
<h4 class="font-label-md text-label-md text-on-surface">Netflix</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">2 accounts</p>
</div>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-outline hover:text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<!-- Item 4: Bank -->
<div class="group relative flex items-center justify-between p-md bg-surface-container-low rounded-lg border border-outline-variant/10 hover:border-outline-variant/30 transition-all cursor-pointer overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-[2px] bg-transparent group-hover:bg-primary transition-colors"></div>
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-[24px]" data-icon="account_balance">account_balance</span>
</div>
<div>
<h4 class="font-label-md text-label-md text-on-surface">Chase Bank</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">1 account, 2 cards</p>
</div>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-outline hover:text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>
<!-- Add New FAB (Contextual to list) -->
<div class="fixed bottom-[100px] right-margin-mobile z-40">
<button class="w-14 h-14 bg-primary-container text-on-primary-container rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(88,101,242,0.4)] hover:scale-[0.98] transition-transform">
<span class="material-symbols-outlined text-[28px]" data-icon="add">add</span>
</button>
</div>
</main>
<!-- BottomNavBar (Mobile specific navigation shell) -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-high/90 backdrop-blur-xl nav-shell-shadow pb-safe pt-2 px-2 flex justify-around items-center h-[80px]">
<!-- Active Tab: All Items -->
<button class="flex flex-col items-center justify-center w-16 h-14 gap-1 group">
<div class="w-14 h-8 rounded-full bg-secondary-container flex items-center justify-center transition-all group-active:scale-95">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="shield" data-weight="fill">shield</span>
</div>
<span class="font-label-md text-[11px] font-medium text-on-surface">All Items</span>
</button>
<!-- Inactive Tab: Favorites -->
<button class="flex flex-col items-center justify-center w-16 h-14 gap-1 group">
<div class="w-14 h-8 rounded-full bg-transparent flex items-center justify-center transition-all group-hover:bg-surface-container-highest group-active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors" data-icon="star">star</span>
</div>
<span class="font-label-md text-[11px] font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Favorites</span>
</button>
<!-- Inactive Tab: Folders -->
<button class="flex flex-col items-center justify-center w-16 h-14 gap-1 group">
<div class="w-14 h-8 rounded-full bg-transparent flex items-center justify-center transition-all group-hover:bg-surface-container-highest group-active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors" data-icon="folder_open">folder_open</span>
</div>
<span class="font-label-md text-[11px] font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Folders</span>
</button>
<!-- Inactive Tab: Settings -->
<button class="flex flex-col items-center justify-center w-16 h-14 gap-1 group">
<div class="w-14 h-8 rounded-full bg-transparent flex items-center justify-center transition-all group-hover:bg-surface-container-highest group-active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors" data-icon="settings">settings</span>
</div>
<span class="font-label-md text-[11px] font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Settings</span>
</button>
</nav>
</body></html>
