name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pydantic cryptography pytest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build APK with Flet
        run: flet build apk --project LuuPass --module-name main

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuuPass-Android-APK
          path: build/apk/**/*.apk
          retention-days: 7
